<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест загрузки модели</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            font-size: 12px;
            max-width: 80%;
        }
        #status {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: yellow;
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 100;
        }
        button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        🔍 Тест загрузки GLB модели<br>
        Файл: <strong id="filename">проверяем...</strong>
    </div>
    <div id="status">
        ⏳ Статус: инициализация...
    </div>
    <button id="vr-btn">🥽 Войти в VR</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const statusDiv = document.getElementById('status');
        const filenameSpan = document.getElementById('filename');
        
        function setStatus(message, isError = false) {
            statusDiv.innerHTML = `📢 ${message}`;
            statusDiv.style.color = isError ? '#ff8888' : '#88ff88';
            console.log(message);
        }

        // --- НАСТРОЙТЕ ЭТО: укажите точное имя вашего GLB файла ---
        const MODEL_FILE = 'Untitled.glb';  // <--- ИЗМЕНИТЕ НА ВАШЕ ИМЯ ФАЙЛА
        filenameSpan.textContent = MODEL_FILE;
        
        // --- Создание сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        // Камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.6, 3);
        camera.lookAt(0, 0, 0);
        
        // Рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // VR кнопка
        const vrButton = VRButton.createButton(renderer);
        vrButton.style.position = 'absolute';
        vrButton.style.bottom = '20px';
        vrButton.style.right = '20px';
        vrButton.style.width = 'auto';
        document.body.appendChild(vrButton);
        
        // Кнопка из HTML тоже дублирует вход в VR
        document.getElementById('vr-btn').addEventListener('click', () => {
            if (!renderer.xr.isPresenting) {
                renderer.xr.setSessionEnabled(true);
            }
        });
        
        // Орбит контрол для десктопа
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        
        // --- Освещение (яркое, чтобы модель точно было видно) ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        // Основной направленный свет
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        // Заполняющий свет сзади
        const backLight = new THREE.PointLight(0x88aaff, 0.5);
        backLight.position.set(0, 1, -2);
        scene.add(backLight);
        
        // Свет снизу, чтобы подсветить тени
        const fillLight = new THREE.PointLight(0xffaa66, 0.3);
        fillLight.position.set(0, 0.5, 0);
        scene.add(fillLight);
        
        // --- Вспомогательные объекты для ориентации ---
        // Пол-сетка
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        // Оси координат (красный X, зеленый Z, синий Y)
        const axesHelper = new THREE.AxesHelper(2);
        scene.add(axesHelper);
        
        // Кубик для проверки, что рендеринг вообще работает
        const testCube = new THREE.Mesh(
            new THREE.BoxGeometry(0.3, 0.3, 0.3),
            new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x442200 })
        );
        testCube.position.set(1, 0.5, 1);
        scene.add(testCube);
        
        setStatus('Сцена создана, загружаем модель...');
        
        // --- ЗАГРУЗКА МОДЕЛИ ---
        const loader = new GLTFLoader();
        
        loader.load(MODEL_FILE, 
            (gltf) => {
                // Успешная загрузка
                setStatus('✅ Модель загружена! Добавляем на сцену...');
                const model = gltf.scene;
                scene.add(model);
                
                // Настраиваем тени
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                // Центрируем модель (опционально)
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y += 0.5; // Поднимаем на уровень пола
                
                setStatus('✅ Модель отображается! Осмотритесь с помощью мыши (или войдите в VR)');
                
                // Убираем тестовый кубик, чтобы не мешал
                testCube.visible = false;
            },
            (xhr) => {
                // Прогресс загрузки
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                setStatus(`Загрузка модели: ${percent}%`);
            },
            (error) => {
                // Ошибка загрузки
                setStatus(`❌ ОШИБКА: модель не загружена! Файл "${MODEL_FILE}" не найден или поврежден.`, true);
                console.error('Детали ошибки:', error);
                
                // Добавляем подсказку на экран
                const errorDiv = document.createElement('div');
                errorDiv.style.position = 'absolute';
                errorDiv.style.top = '100px';
                errorDiv.style.left = '20px';
                errorDiv.style.background = 'rgba(255,0,0,0.8)';
                errorDiv.style.color = 'white';
                errorDiv.style.padding = '20px';
                errorDiv.style.borderRadius = '10px';
                errorDiv.style.zIndex = '200';
                errorDiv.innerHTML = `
                    <strong>❌ Модель не загружена!</strong><br>
                    Имя файла: ${MODEL_FILE}<br>
                    Проверьте:<br>
                    1. Файл загружен в тот же репозиторий, что и index.html<br>
                    2. Имя файла написано точно (с учетом регистра)<br>
                    3. Файл не поврежден (попробуйте открыть его на компьютере)<br>
                    <br>
                    <a href="https://github.com/ваш-логин/ваш-репозиторий" target="_blank" style="color: #88ff88">Открыть GitHub</a>
                `;
                document.body.appendChild(errorDiv);
            }
        );
        
        // --- Анимация ---
        function animate() {
            if (!renderer.xr.isPresenting) {
                controls.update();
            }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        setStatus('Готово. Ожидаем загрузку модели...');
    </script>
</body>
</html>
