<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Интерактивное помещение</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Roboto', sans-serif; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 100;
            pointer-events: none;
        }
        button {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover {
            background: #4285f4;
            transform: scale(1.02);
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
        .vr-btn {
            background: #ff5722;
        }
        .vr-btn:hover {
            background: #e64a19;
        }
    </style>
</head>
<body>
    <div id="status">
        🔄 Инициализация...
    </div>
    <div id="controls">
        <button id="move-table-btn">🔄 Переместить стол</button>
        <button id="change-material-btn">🎨 Сменить материал</button>
        <button id="enter-vr-btn" class="vr-btn">🥽 Войти в VR</button>
        <button id="add-light-btn">💡 Добавить факел</button>
        <button id="move-light-btn">🔥 Переместить факел</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const statusDiv = document.getElementById('status');
        
        function setStatus(msg) {
            statusDiv.innerHTML = msg;
            console.log(msg);
        }
        
        // --- НАСТРОЙКА: укажите имя вашего GLB файла ---
        const MODEL_FILE = 'Untitled.glb';  // <-- ИЗМЕНИТЕ НА ВАШЕ ИМЯ ФАЙЛА
        
        // --- Создание сцены ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // Тёмный фон
        
        // --- КАМЕРА: важная настройка для VR ---
        // Камера создаётся на уровне глаз пользователя (1.6м)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0); // Пользователь в центре, на уровне глаз
        camera.lookAt(0, 1.6, -2);
        
        // --- Рендерер с VR поддержкой ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Включаем тени
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Мягкие тени
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        // --- Кнопка VR (встроенная) ---
        const vrButton = VRButton.createButton(renderer);
        vrButton.style.position = 'absolute';
        vrButton.style.bottom = '20px';
        vrButton.style.right = '20px';
        vrButton.style.padding = '12px 24px';
        vrButton.style.borderRadius = '40px';
        vrButton.style.fontSize = '16px';
        vrButton.style.fontWeight = 'bold';
        vrButton.style.zIndex = '100';
        document.body.appendChild(vrButton);
        
        // --- Орбит контрол для десктопа (не влияет на VR) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1, -2);
        
        // --- ОСВЕЩЕНИЕ ---
        // Ambient light (базовое освещение)
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Основной направленный свет (имитация дневного)
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 10;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Заполняющий свет сзади
        const backLight = new THREE.PointLight(0x88aaff, 0.4);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        
        // Тёплый свет снизу
        const warmLight = new THREE.PointLight(0xffaa66, 0.3);
        warmLight.position.set(0, 0.5, 0);
        scene.add(warmLight);
        
        // --- ПЕРЕМЕННЫЕ ДЛЯ ДИНАМИЧЕСКОГО СВЕТА (факел) ---
        let torchLight = null;      // сам источник света
        let torchHelper = null;     // визуальный helper (сфера) для перемещения
        let torchPosition = { x: 1.5, z: 1.5 };
        
        // --- ВСПОМОГАТЕЛЬНЫЕ ОБЪЕКТЫ ДЛЯ ОРИЕНТАЦИИ ---
        // Пол-сетка (помогает понять, где пол)
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);
        
        // Простая ось (для отладки)
        const axesHelper = new THREE.AxesHelper(1.5);
        scene.add(axesHelper);
        
        // --- ПЕРЕМЕННЫЕ ДЛЯ МОДЕЛИ ---
        let modelRoot = null;
        let tableObject = null;
        let originalMaterial = null;
        let tableOffsetX = 0;
        
        // --- ФУНКЦИЯ ДОБАВЛЕНИЯ ФАКЕЛА (перемещаемый источник света) ---
        function addTorchLight() {
            if (torchLight) {
                setStatus('🔥 Факел уже существует');
                return;
            }
            
            // Создаём источник света
            torchLight = new THREE.PointLight(0xff6600, 1.5, 8);
            torchLight.castShadow = true;
            torchLight.shadow.mapSize.width = 512;
            torchLight.shadow.mapSize.height = 512;
            torchLight.position.set(torchPosition.x, 1.2, torchPosition.z);
            scene.add(torchLight);
            
            // Добавляем маленькую сферу, чтобы видеть, где находится факел (в VR будет видно)
            const geometry = new THREE.SphereGeometry(0.12, 16, 16);
            const material = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff2200, emissiveIntensity: 0.8 });
            torchHelper = new THREE.Mesh(geometry, material);
            torchHelper.position.copy(torchLight.position);
            scene.add(torchHelper);
            
            // Добавляем маленький партикл-эффект (огонь)
            const fireGlow = new THREE.PointLight(0xff4400, 0.8, 3);
            fireGlow.position.copy(torchLight.position);
            scene.add(fireGlow);
            torchHelper.userData = { glow: fireGlow };
            
            setStatus('✅ Факел добавлен! Используйте кнопку "Переместить факел"');
        }
        
        // --- ФУНКЦИЯ ПЕРЕМЕЩЕНИЯ ФАКЕЛА ---
        function moveTorch() {
            if (!torchLight) {
                setStatus('⚠️ Сначала добавьте факел (кнопка "Добавить факел")');
                return;
            }
            
            // Циклическое перемещение по квадрату
            const positions = [
                { x: 1.5, z: 1.5 },   // угол комнаты
                { x: -1.5, z: 1.5 },  // другой угол
                { x: -1.5, z: -1.5 }, // третий угол
                { x: 1.5, z: -1.5 },  // четвёртый угол
                { x: 0, z: 0 }        // центр
            ];
            
            let currentIndex = positions.findIndex(p => p.x === torchPosition.x && p.z === torchPosition.z);
            currentIndex = (currentIndex + 1) % positions.length;
            torchPosition = positions[currentIndex];
            
            torchLight.position.set(torchPosition.x, 1.2, torchPosition.z);
            torchHelper.position.set(torchPosition.x, 1.2, torchPosition.z);
            if (torchHelper.userData.glow) {
                torchHelper.userData.glow.position.set(torchPosition.x, 1.2, torchPosition.z);
            }
            
            setStatus(`🔥 Факел перемещён на позицию: x=${torchPosition.x}, z=${torchPosition.z}`);
        }
        
        // --- ЗАГРУЗКА МОДЕЛИ ---
        setStatus('📦 Загрузка модели: ' + MODEL_FILE);
        const loader = new GLTFLoader();
        
        loader.load(MODEL_FILE,
            (gltf) => {
                modelRoot = gltf.scene;
                scene.add(modelRoot);
                setStatus('✅ Модель загружена! Настройка теней...');
                
                // Настройка теней для всех объектов модели
                modelRoot.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                // --- ПОИСК СТОЛА ПО ИМЕНИ ---
                // ВАЖНО: в вашей модели нужно назвать объект стола так, чтобы в имени было "table" или "стол"
                modelRoot.traverse(node => {
                    if (node.isMesh) {
                        const name = node.name.toLowerCase();
                        if (name.includes('table') || name.includes('стол') || name.includes('desk')) {
                            tableObject = node;
                            if (node.material) {
                                originalMaterial = node.material;
                            } else if (Array.isArray(node.material) && node.material[0]) {
                                originalMaterial = node.material[0];
                            }
                            setStatus(`✅ Стол найден: ${node.name}`);
                        }
                    }
                });
                
                if (!tableObject) {
                    setStatus('⚠️ Стол не найден в модели. Убедитесь, что объект стола имеет имя с "table" или "стол"');
                }
                
                // Центрируем модель (опционально)
                const box = new THREE.Box3().setFromObject(modelRoot);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                // Опускаем модель на пол (сетка на y=-0.01)
                const minY = box.min.y;
                modelRoot.position.y = -minY;
                
                setStatus('✅ Модель размещена на полу. Готово к VR!');
            },
            (xhr) => {
                const percent = Math.round(xhr.loaded / xhr.total * 100);
                setStatus(`📦 Загрузка: ${percent}%`);
            },
            (error) => {
                setStatus(`❌ ОШИБКА: модель "${MODEL_FILE}" не найдена!`);
                console.error('Ошибка загрузки:', error);
            }
        );
        
        // --- ВЗАИМОДЕЙСТВИЕ С КНОПКАМИ ---
        document.getElementById('move-table-btn').addEventListener('click', () => {
            if (!tableObject) {
                alert('Стол не найден в модели. Убедитесь, что объект стола имеет имя с "table" или "стол"');
                return;
            }
            // Циклическое перемещение
            if (tableOffsetX === 0) tableOffsetX = 0.6;
            else if (tableOffsetX === 0.6) tableOffsetX = -0.5;
            else tableOffsetX = 0;
            tableObject.position.x = tableOffsetX;
            setStatus(`🔄 Стол перемещён на x = ${tableOffsetX}`);
        });
        
        document.getElementById('change-material-btn').addEventListener('click', () => {
            if (!tableObject) {
                alert('Стол не найден');
                return;
            }
            if (!tableObject.material && !tableObject.material?.length) {
                alert('У стола нет материала');
                return;
            }
            const hue = Math.random();
            const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
            
            if (tableObject.material) {
                const newMat = tableObject.material.clone();
                newMat.color = color;
                tableObject.material = newMat;
            } else if (Array.isArray(tableObject.material)) {
                const newMat = tableObject.material[0].clone();
                newMat.color = color;
                tableObject.material[0] = newMat;
            }
            setStatus(`🎨 Материал стола изменён`);
        });
        
        document.getElementById('enter-vr-btn').addEventListener('click', () => {
    if (!renderer.xr.isPresenting) {
        // Правильный метод для входа в VR
        renderer.xr.setSession(true);
        setStatus('🥽 Вход в VR... Наденьте шлем');
    }
});
        
        document.getElementById('add-light-btn').addEventListener('click', addTorchLight);
        document.getElementById('move-light-btn').addEventListener('click', moveTorch);
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            // Анимация для факела (мерцание)
            if (torchLight) {
                const intensity = 1.2 + Math.sin(Date.now() * 0.015) * 0.3;
                torchLight.intensity = intensity;
                if (torchHelper.userData.glow) {
                    torchHelper.userData.glow.intensity = 0.6 + Math.sin(Date.now() * 0.02) * 0.3;
                }
            }
            
            if (!renderer.xr.isPresenting) {
                controls.update();
            }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // Адаптация размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        setStatus('✅ Система готова. Нажмите "Войти в VR" в шлеме');
    </script>
</body>
</html>
