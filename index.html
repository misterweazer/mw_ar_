<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Интерактивное помещение</title>
    <style>
        /* === Ваши стили из styles.css (адаптированы) === */
        :not(:defined) > * {
            display: none;
        }
        html {
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Roboto Regular', Helvetica Neue, sans-serif;
        }
        /* Контейнер для Three.js canvas занимает всё окно */
        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Стили для кнопки AR (как в вашем шаблоне) */
        #ar-button {
            background-image: url('ar_icon.png');
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 16px;
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color: #4285f4;
            height: 36px;
            line-height: 36px;
            border-radius: 18px;
            border: 1px solid #DADCE0;
            cursor: pointer;
            z-index: 20;
            transition: background-color 0.2s;
        }
        #ar-button:active {
            background-color: #E8EAED;
        }
        #ar-button:focus {
            outline: none;
        }
        /* Прогресс-бар (ваш дизайн) */
        .progress-bar {
            display: block;
            width: 33%;
            height: 10%;
            max-height: 2%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate3d(-50%, -50%, 0);
            border-radius: 25px;
            box-shadow: 0px 3px 10px 3px rgba(0, 0, 0, 0.5), 0px 0px 5px 1px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.9);
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
        }
        .progress-bar.hide {
            visibility: hidden;
            transition: visibility 0.3s;
        }
        .update-bar {
            background-color: rgba(255, 255, 255, 0.9);
            width: 0%;
            height: 100%;
            border-radius: 25px;
            float: left;
            transition: width 0.3s;
        }
        /* Дополнительные кнопки управления (как в прошлом примере, но в вашем стиле) */
        .control-panel {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            z-index: 20;
            pointer-events: none;
        }
        .control-panel button {
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .control-panel button:hover {
            background: #4285f4;
            border-color: #4285f4;
            transform: scale(1.02);
        }
        .control-panel button:active {
            transform: scale(0.98);
        }
        @media (max-width: 600px) {
            .control-panel button { padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- Ваш прогресс-бар -->
    <div id="progress-container" class="progress-bar">
        <div class="update-bar" id="progress-bar-fill"></div>
    </div>
    
    <!-- Ваша AR-кнопка (будет дублировать вход в VR) -->
    <button id="ar-button">View in your space</button>
    
    <!-- Панель дополнительных кнопок -->
    <div class="control-panel">
        <button id="move-table-btn">🔄 Переместить стол</button>
        <button id="change-material-btn">🎨 Сменить материал</button>
    </div>

    <!-- Импорт Three.js и дополнений -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- Настройка сцены ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        // Камера
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 1.6, 3);
        
        // Рендерер с поддержкой VR
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.xr.enabled = true;
        container.appendChild(renderer.domElement);
        
        // Кнопка VR (добавляем рядом с вашей AR-кнопкой, можно скрыть оригинальную, но оставим функционал)
        const vrButton = VRButton.createButton(renderer);
        vrButton.style.position = 'absolute';
        vrButton.style.bottom = '16px';
        vrButton.style.right = '16px';
        vrButton.style.left = 'auto';
        vrButton.style.width = 'auto';
        vrButton.style.padding = '0px 16px';
        vrButton.style.borderRadius = '18px';
        vrButton.style.fontSize = '14px';
        vrButton.style.zIndex = '20';
        document.body.appendChild(vrButton);
        
        // Орбит контрол для десктопа
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.screenSpacePanning = true;
        
        // --- Освещение (реалистичное) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 5, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0xccaa88, 0.4);
        fillLight.position.set(-1, 2, -2);
        scene.add(fillLight);
        
        // Пол (сетка для ориентира)
        const gridHelper = new THREE.GridHelper(8, 20, 0x888888, 0x444444);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);
        
        // --- Переменные ---
        let modelRoot = null;
        let tableObject = null;
        let originalMaterial = null;
        let tableOffsetX = 0;
        
        // Прогресс-бар
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-bar-fill');
        
        // --- Загрузка модели (укажите имя вашего GLB файла) ---
        const loader = new GLTFLoader();
        const modelUrl = 'Untitled.glb';  // <-- ЗДЕСЬ ВАШ ФАЙЛ (тот же, что в исходном шаблоне)
        
        loader.load(modelUrl, 
            (gltf) => {
                modelRoot = gltf.scene;
                scene.add(modelRoot);
                
                // Настройка теней
                modelRoot.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                // Поиск стола по имени (ищем "table", "стол", "desk")
                modelRoot.traverse(node => {
                    if (node.isMesh) {
                        const name = node.name.toLowerCase();
                        if (name.includes('table') || name.includes('стол') || name.includes('desk')) {
                            tableObject = node;
                            if (node.material) {
                                originalMaterial = node.material;
                            } else if (Array.isArray(node.material) && node.material[0]) {
                                originalMaterial = node.material[0];
                            }
                            console.log('✅ Стол найден:', node.name);
                        }
                    }
                });
                
                if (!tableObject) {
                    console.warn('⚠️ Стол не найден в модели. Проверьте имена объектов в GLB.');
                }
                
                // Скрываем прогресс-бар после загрузки
                progressContainer.classList.add('hide');
            },
            (xhr) => {
                // Обновление прогресс-бара
                const percent = xhr.loaded / xhr.total;
                progressFill.style.width = `${percent * 100}%`;
                if (percent === 1) {
                    progressContainer.classList.add('hide');
                } else {
                    progressContainer.classList.remove('hide');
                }
            },
            (error) => {
                console.error('Ошибка загрузки модели:', error);
                progressContainer.classList.add('hide');
                alert('Не удалось загрузить модель. Проверьте файл Untitled.glb');
            }
        );
        
        // --- Взаимодействие ---
        document.getElementById('move-table-btn').addEventListener('click', () => {
            if (!tableObject) {
                alert('Стол не найден в модели. Убедитесь, что в GLB есть объект с именем, содержащим "table"');
                return;
            }
            // Циклическое перемещение: центр -> вправо -> влево -> центр
            if (tableOffsetX === 0) tableOffsetX = 0.5;
            else if (tableOffsetX === 0.5) tableOffsetX = -0.4;
            else tableOffsetX = 0;
            tableObject.position.x = tableOffsetX;
        });
        
        document.getElementById('change-material-btn').addEventListener('click', () => {
            if (!tableObject) {
                alert('Стол не найден');
                return;
            }
            if (!tableObject.material && !tableObject.material?.length) {
                alert('У стола нет материала для смены');
                return;
            }
            // Случайный цвет
            const hue = Math.random();
            const color = new THREE.Color().setHSL(hue, 0.8, 0.6);
            
            if (tableObject.material) {
                const newMat = tableObject.material.clone();
                newMat.color = color;
                tableObject.material = newMat;
            } else if (Array.isArray(tableObject.material)) {
                const newMat = tableObject.material[0].clone();
                newMat.color = color;
                tableObject.material[0] = newMat;
            }
        });
        
        // Кнопка "View in your space" — активирует VR
        document.getElementById('ar-button').addEventListener('click', () => {
            if (!renderer.xr.isPresenting) {
                renderer.xr.setSessionEnabled(true);
            }
        });
        
        // --- Анимация ---
        function animate() {
            if (!renderer.xr.isPresenting) {
                controls.update();
            }
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate();
        
        // Адаптация к изменению размера окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Готово. Если модель не загружается — проверьте имя файла Untitled.glb');
    </script>
</body>
</html>
